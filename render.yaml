services:
  - type: web
    name: savomart-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: STORES_API_TOKEN
        sync: false
      - key: STORES_API_URL
        value: https://internal-service.savomart.in/bridge/api/store/list?is_operational=True
      - key: FRONTEND_URL
        sync: false
      # Admin JWT (separate from customer JWT — never mixed)
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: ADMIN_SUPERADMIN_EMAIL
        sync: false
      - key: ADMIN_SUPERADMIN_PASSWORD
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: "3.12.6"
